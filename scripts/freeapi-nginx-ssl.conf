server {
    listen 127.0.0.1:8080;
    server_name freeapi.kenoma.me;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name freeapi.kenoma.me;

    ssl_certificate /etc/letsencrypt/live/freeapi.kenoma.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/freeapi.kenoma.me/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    root /opt/FreeApi/web-dist;
    index index.html;

    auth_basic "FreeApi restricted console";
    auth_basic_user_file /etc/nginx/.freeapi_htpasswd;

    location /cors-proxy {
        proxy_pass http://127.0.0.1:8081/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /v1 {
        auth_basic off;
        proxy_pass http://127.0.0.1:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
